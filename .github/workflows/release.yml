name: release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: add x86_64 macOS target
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: install npm dependencies
        run: npm ci

      # Build the Tauri app. We deliberately do NOT pass `tagName` here:
      # when `tagName` is set, tauri-action always tries to find-or-create
      # a release with that tag, which collides across matrix jobs and
      # fails with `"releaseName" not set`. The dedicated `release` job
      # below uses softprops/action-gh-release to publish a single release
      # with all installers collected from these build jobs.
      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.os == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          # `**` covers both the native target dir (Linux/Windows:
          # `target/release/bundle/...`) and the universal macOS dir
          # (`target/universal-apple-darwin/release/bundle/...`).
          path: |
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*-setup.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: read version
        id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: list artifacts
        run: find artifacts -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.gz" \) | sort

      - name: create draft release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "yadm studio v${{ steps.version.outputs.version }}"
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## yadm studio v${{ steps.version.outputs.version }}

            Cross-platform desktop GUI for [yadm](https://yadm.io/).

            ### Installers
            - **macOS** (universal: Intel + Apple Silicon): `.dmg` / `.app`
            - **Linux**: `.deb` / `.AppImage` / `.rpm`
            - **Windows**: `.msi` / `-setup.exe`

            ### Requirements
            yadm must be installed and on `$PATH`. See https://yadm.io/docs/install.
          files: |
            artifacts/**/*.msi
            artifacts/**/*-setup.exe
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
